server {
    listen 80;
    server_name localhost;

    # Direct static file serving for dynamic uploads with Hostinger NVMe optimization
    location /uploads/ {
        alias /app/apps/web/public/uploads/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        autoindex off;
    }

    location /public/uploads/ {
        alias /app/apps/web/public/uploads/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        autoindex off;
    }

    # Unbuffered routing to prevent buffering/timeout exceptions on native Server-Sent-Events (SSE)
    location /api/orders/queue {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable proxy buffering for streaming events
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        keepalive_timeout 86400s;
    }

    # Default proxy routing for Next.js dynamic handlers & components
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Upstream proxy descriptors
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
